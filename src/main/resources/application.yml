spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/score-adda-local?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        use_sql_comments: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: false

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:score.addda@gmail.com}
    password: ${MAIL_PASS:zifidasjnzmgkecy}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
        # Flip MAIL_DEBUG=true to dump the full SMTP conversation to the console (verbose;
        # includes base64 AUTH lines — use locally only, never in shared/prod logs).
        debug: ${MAIL_DEBUG:false}

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

app:
  jwt:
    secret: ${JWT_SECRET:turfbook-super-secret-key-change-in-production-must-be-256-bits-long-enough}
    expiration-ms: 86400000  # 24 hours
  upload:
    dir: ${UPLOAD_DIR:uploads}
  base-url: ${BASE_URL:http://localhost:8080}
  cors:
    # Comma-separated allowed web origins; "*" for local dev. Override per environment.
    # Native mobile sends no Origin header, so this only affects browser clients.
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  mail:
    # From header. For the Gmail API transport this is the authorized account
    # (e.g. "Score-Adda <score.addda@gmail.com>"). For SMTP fallback it's the Gmail address too.
    from: ${MAIL_FROM:Score-Adda <score.addda@gmail.com>}
    # Preferred transport: Gmail API over HTTPS (works where SMTP is blocked, e.g. Railway) and
    # sends genuinely FROM the authorized Gmail account. Active when all three OAuth values are set.
    gmail:
      client-id: ${GMAIL_CLIENT_ID:}
      client-secret: ${GMAIL_CLIENT_SECRET:}
      refresh-token: ${GMAIL_REFRESH_TOKEN:}
    resend:
      # Alternative HTTPS transport (used only if Gmail OAuth isn't configured). Needs a verified domain.
      api-key: ${RESEND_API_KEY:}
  otp:
    # DEV ONLY: when true, generated OTP codes are written to the log so you can test the
    # reset flow without opening the inbox. Keep false in any shared/prod environment.
    debug-log-codes: ${OTP_DEBUG_LOG:false}
  bootstrap:
    admin:
      # First-run SUPER_ADMIN bootstrap (see AdminSeeder). Set both env vars on the deploy host;
      # the seeded admin is forced to change this password on first login. Leave unset once a
      # super-admin exists — the seeder is idempotent and skips when one is present.
      email: ${BOOTSTRAP_ADMIN_EMAIL:score.addda@gmail.com}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:Password@123}

server:
  port: 8080
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
  show-actuator: false

logging:
  level:
    # Set APP_LOG_LEVEL=DEBUG to see the fine-grained reset/mail debug logs.
    com.turfbook.backend: ${APP_LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    # Spring's mail plumbing; pairs with MAIL_DEBUG for SMTP-level tracing.
    org.springframework.mail: ${MAIL_LOG_LEVEL:INFO}
