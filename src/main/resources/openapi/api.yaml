  /api/v1/users/me/role:
    patch:
      tags: [Users]
      summary: Change own account role (PLAYER ↔ OWNER)
      description: >
        Self-service role change with password re-authentication.
        Cannot elevate to ADMIN. Returns a fresh JWT with the new role
        so the change takes effect immediately without requiring a separate login.
      operationId: changeMyRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeRoleRequest'
      responses:
        '200':
          description: Role changed; new JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: No-op (already that role) or invalid target role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Wrong password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

