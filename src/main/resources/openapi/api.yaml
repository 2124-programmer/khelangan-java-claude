  /api/v1/admin/venues/{id}:
    get:
      tags: [Admin]
      summary: Get full venue detail with owner context (Admin)
      description: >-
        ADMIN-scoped full venue detail for a venue in ANY status (incl. PENDING/DRAFT/REJECTED),
        plus owner contact and venue history. Use this to review a pending venue before approving.
      operationId: adminGetVenue
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Venue detail with admin context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminVenueDetailDto'
        '404':
          description: Not found

  /api/v1/owner/venues/{venueId}/submit:
    post:
      tags: [Venues]
      summary: Submit (or resubmit) a venue for approval (Owner)
      description: >-
        Moves a DRAFT or CHANGES_REQUESTED venue into PENDING. Requires at least one court.
        Venues with ≤2 courts submit free (Starter tier defaulted). Venues with >2 courts must
        pass a `planId` whose plan.maxCourts ≥ court count (422 otherwise); that tier is stored
        as the venue's intended plan and used for the auto-trial on approval.
      operationId: submitVenue
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitVenueRequest'
      responses:
        '200':
          description: Venue submitted (now PENDING)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueDetailDto'
        '422':
          description: Court count exceeds the free threshold and no qualifying tier was selected

