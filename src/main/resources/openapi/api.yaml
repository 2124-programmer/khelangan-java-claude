      parameters:
        - name: courtId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkBlockRequest'
      responses:
        '200':
          description: List of blocked slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SlotDto'

  /api/v1/slots/{id}/block:
