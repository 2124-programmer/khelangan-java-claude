      responses:
        '200':
          description: Blocked slot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SlotDto'

  /api/v1/slots/{id}/unblock:
    patch:
      tags: [Slots]
      summary: Unblock a slot (Owner)
      operationId: unblockSlot
