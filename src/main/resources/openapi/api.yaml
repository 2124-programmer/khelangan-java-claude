openapi: 3.0.3
info:
  title: TurfBook API
  description: TurfBook – Sports Venue Booking Marketplace REST API
  version: 1.0.0
  contact:
    name: TurfBook Team
    email: support@turfbook.com

servers:
  - url: http://localhost:8080
    description: Local development server

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ─── Auth ───────────────────────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [name, email, phone, password, role, acceptedTerms]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 7
          maxLength: 20
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [PLAYER, OWNER]
        acceptedTerms:
          type: boolean
          description: Must be true — the user accepted the Terms & Privacy Policy (DPDP consent).

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    OtpSendRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          description: Account email. Backend looks up the registered phone and sends OTP there.

    OtpSendResponse:
      type: object
      properties:
        maskedDestination:
          type: string
          description: Masked phone number showing where the code was sent, e.g. +91•••••3210
        expiresInSec:
          type: integer
          description: Seconds until the OTP expires (300 = 5 min)
        resendAfterSec:
          type: integer
          description: Seconds to wait before requesting a new code (0 = resend allowed now)

    OtpVerifyRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          minLength: 6
          maxLength: 6

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/UserDto'

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    UnreadCountResponse:
      type: object
      properties:
        count:
          type: integer
          format: int64

    # ─── User ───────────────────────────────────────────────────────────────
    UserDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          type: string
        avatarUrl:
          type: string
        preferredSports:
          type: array
          items:
            type: string
        totalBookings:
          type: integer
        isPremium:
          type: boolean
        isBlocked:
          type: boolean
        createdAt:
          type: string
          format: date-time

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        phone:
          type: string
        avatarUrl:
          type: string
        preferredSports:
          type: array
          items:
            type: string

    ChangeRoleRequest:
      type: object
      required: [targetRole, password]
      properties:
        targetRole:
          type: string
          enum: [PLAYER, OWNER]
          description: The role to switch to. ADMIN is not self-assignable.
        password:
          type: string
          minLength: 6
          description: Current password for re-authentication before role change.

    UserPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/UserDto'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    # ─── Sport ──────────────────────────────────────────────────────────────
    SportDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        icon:
          type: string

    CreateSportRequest:
      type: object
      required: [name, icon]
      properties:
        name:
          type: string
        icon:
          type: string

    UpdateSportRequest:
      type: object
      properties:
        name:
          type: string
        icon:
          type: string

    # ─── Venue ──────────────────────────────────────────────────────────────
    VenueSummaryDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        pincode:
          type: string
        status:
          type: string
        ratingAverage:
          type: number
          format: double
          nullable: true
          description: Average star rating (1–5). null when no reviews exist yet.
        ratingCount:
          type: integer
          format: int64
          description: Total number of reviews.
        pricePerHour:
          type: integer
          description: Venue-level default price per hour (₹)
        openTime:
          type: string
          description: First bookable hour in HH:00 format (e.g. "05:00")
          example: "05:00"
        closeTime:
          type: string
          description: Last slot ends at this hour in HH:00 format (e.g. "23:00")
          example: "23:00"
        isActive:
          type: boolean
        coverPhoto:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        ownerId:
          type: integer
          format: int64
        sports:
          type: array
          items:
            $ref: '#/components/schemas/SportDto'
        amenities:
          type: array
          items:
            type: string
        courtCount:
          type: integer
          format: int64
          description: Number of courts belonging to this venue (owner list only)
        featured:
          type: boolean
          description: True when the venue's active plan grants the featured badge
        isFavorite:
          type: boolean
          description: True when the current authenticated player has favorited this venue. Always false for anonymous requests.
        # Best active owner-funded promo for this venue, or null. Owner-funded only — never a
        # platform-funded discount. Plain $ref so the field reuses VenueOfferBadge directly.
        activeOffer:
          $ref: '#/components/schemas/VenueOfferBadge'
        createdAt:
          type: string
          format: date-time
          description: When the venue was submitted/registered (used for submission age and oldest-first ordering)
        subscription:
          $ref: '#/components/schemas/VenueSubscriptionSummary'

    VenueOfferBadge:
      type: object
      description: Compact offer label for a discovery card (e.g. "10% off", "₹100 off").
      properties:
        label:
          type: string

    VenueSubscriptionSummary:
      type: object
      description: Compact plan + remaining-days data for the owner status badge (server-computed, IST).
      properties:
        planCode:
          type: string
        planName:
          type: string
        status:
          type: string
          description: TRIALING, ACTIVE, PAST_DUE, EXPIRED, CANCELED, or VOIDED
        effectiveEnd:
          type: string
          format: date-time
          nullable: true
          description: trialEnd when trialing, else periodEnd.
        remainingDays:
          type: integer
          description: Whole days from now (IST) until effectiveEnd; 0 when past.
        expiringSoon:
          type: boolean
          description: True when remainingDays is at/below the soon threshold (7).

    ContactVenueRequest:
      type: object
      required: [channel]
      properties:
        channel:
          type: string
          enum: [CALL, WHATSAPP]
          description: How the player chose to reach the venue.

    ContactVenueResponse:
      type: object
      properties:
        ok:
          type: boolean
          description: True when the intent was recorded.
        notified:
          type: boolean
          description: True if the owner was notified; false when deduped within the cooldown window.

    VenueDetailDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        pincode:
          type: string
        description:
          type: string
        contactPhone:
          type: string
          nullable: true
          description: >-
            Venue business phone. Returned ONLY to authenticated callers; null/omitted
            for anonymous (guest) requests so the number cannot be harvested without login.
        contactAvailable:
          type: boolean
          description: >-
            True when the venue has a contact number on file. Safe to expose to everyone
            (it carries no number) — drives whether the "Contact venue" entry point is shown.
        status:
          type: string
        ratingAverage:
          type: number
          format: double
          nullable: true
          description: Average star rating (1–5). null when no reviews exist yet.
        ratingCount:
          type: integer
          format: int64
          description: Total number of reviews.
        pricePerHour:
          type: integer
          description: Venue-level default price per hour (₹)
        openTime:
          type: string
          description: First bookable hour in HH:00 format
          example: "05:00"
        closeTime:
          type: string
          description: Last slot ends at this hour in HH:00 format
          example: "23:00"
        isActive:
          type: boolean
        coverPhoto:
          type: string
        photos:
          type: array
          items:
            type: string
        amenities:
          type: array
          items:
            type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        ownerId:
          type: integer
          format: int64
        sports:
          type: array
          items:
            $ref: '#/components/schemas/SportDto'
        courts:
          type: array
          items:
            $ref: '#/components/schemas/CourtDto'
        createdAt:
          type: string
          format: date-time
        approvalComments:
          type: array
          description: >-
            Approval thread (submit/changes-requested/reject/resubmit/approve).
            Populated only for the venue's owner or an ADMIN; empty for public/player calls.
          items:
            $ref: '#/components/schemas/VenueApprovalComment'

    CreateVenueRequest:
      type: object
      required: [name, address, city, pricePerHour, openTime, closeTime, contactPhone, sportIds]
      properties:
        name:
          type: string
          maxLength: 200
        address:
          type: string
          description: Street address / line 1
        city:
          type: string
        state:
          type: string
        pincode:
          type: string
          description: 6-digit Indian postal code
          pattern: '^\d{6}$'
        description:
          type: string
        contactPhone:
          type: string
          description: 10-digit Indian mobile number
          pattern: '^[6-9]\d{9}$'
        contactEmail:
          type: string
          format: email
        openTime:
          type: string
          description: Opening hour in HH:00 format; minutes must be 00
          example: "05:00"
        closeTime:
          type: string
          description: Closing hour in HH:00 format; must be after openTime
          example: "23:00"
        pricePerHour:
          type: integer
          minimum: 0
          description: Default price per hour in ₹
        amenities:
          type: array
          items:
            type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        sportIds:
          type: array
          minItems: 1
          items:
            type: integer
            format: int64
        coverPhoto:
          type: string
        photos:
          type: array
          items:
            type: string
        isActive:
          type: boolean
          default: true
        courts:
          type: array
          items:
            $ref: '#/components/schemas/CreateCourtRequest'

    UpdateVenueRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        contactPhone:
          type: string
          pattern: '^[6-9]\d{9}$'
        contactEmail:
          type: string
          format: email
        state:
          type: string
        pincode:
          type: string
          pattern: '^\d{6}$'
        openTime:
          type: string
          example: "05:00"
        closeTime:
          type: string
          example: "23:00"
        pricePerHour:
          type: integer
          minimum: 0
        amenities:
          type: array
          items:
            type: string
        address:
          type: string
        city:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        sportIds:
          type: array
          items:
            type: integer
            format: int64
        coverPhoto:
          type: string
        photos:
          type: array
          items:
            type: string
        isActive:
          type: boolean

    VenueStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [DRAFT, PENDING, LIVE, REJECTED, SUSPENDED, CHANGES_REQUESTED]
        rejectionReason:
          type: string
          description: >-
            Owner-facing message. Required when REJECTED (why) or CHANGES_REQUESTED
            (what to fix); recorded in the venue's approval comment history.

    SubmitVenueRequest:
      type: object
      description: Optional body for submit-for-approval. planId is required only when the venue has >2 courts.
      properties:
        planId:
          type: integer
          format: int64
          description: The qualifying tier (plan.maxCourts ≥ court count) for venues over the free threshold.

    AdminOwnerDto:
      type: object
      description: Owner contact + account context, ADMIN-scoped (never returned on public routes).
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        registeredOn:
          type: string
          format: date-time
          description: When the owner's account was created.

    OwnerVenueHistoryDto:
      type: object
      description: Aggregate counts of the owner's venues, so the admin can gauge trust.
      properties:
        totalVenues:
          type: integer
          format: int64
        liveVenues:
          type: integer
          format: int64

    VenueApprovalComment:
      type: object
      description: One entry in a venue's approval thread (submit / changes-requested / reject / resubmit / approve).
      properties:
        id:
          type: integer
          format: int64
        action:
          type: string
          description: SUBMITTED, CHANGES_REQUESTED, REJECTED, RESUBMITTED, or APPROVED
        authorRole:
          type: string
          description: ADMIN or OWNER
        comment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    AdminVenueDetailDto:
      type: object
      description: >-
        Full venue listing (same data players see) plus ADMIN-only owner context.
        Returned by GET /api/v1/admin/venues/{id} for venues in any status.
        statusLabel/statusTone/availableActions are derived server-side from the
        venue's status so the client never re-derives moderation rules.
      properties:
        venue:
          $ref: '#/components/schemas/VenueDetailDto'
        owner:
          $ref: '#/components/schemas/AdminOwnerDto'
        ownerHistory:
          $ref: '#/components/schemas/OwnerVenueHistoryDto'
        intendedPlanCode:
          type: string
          nullable: true
          description: Tier the owner committed to at submission (for >2-court venues); null for free ≤2-court venues.
        commentHistory:
          type: array
          items:
            $ref: '#/components/schemas/VenueApprovalComment'
        approvalStatus:
          type: string
          description: PENDING, CHANGES_REQUESTED, APPROVED, or REJECTED (derived from venue status).
        listingStatus:
          type: string
          description: LIVE, UNLISTED, or NONE (derived from venue status).
        statusLabel:
          type: string
          description: Display label — Live / Unlisted / Pending / Draft / Rejected.
        statusTone:
          type: string
          description: GREEN, AMBER, BLUE, RED, or GRAY.
        availableActions:
          type: array
          description: Moderation actions allowed from the current status.
          items:
            type: string
            description: APPROVE, REJECT, SEND_BACK, RECONSIDER, UNLIST, RELIST, or EDIT.
        rejectionReason:
          type: string
          nullable: true
          description: Latest rejection note (when REJECTED).
        changeNotes:
          type: string
          nullable: true
          description: Latest send-back note (when CHANGES_REQUESTED).
        submittedAt:
          type: string
          format: date-time
          nullable: true
        completeness:
          $ref: '#/components/schemas/VenueCompleteness'

    VenueCompleteness:
      type: object
      properties:
        percent:
          type: integer
        checks:
          type: array
          items:
            $ref: '#/components/schemas/VenueCompletenessCheck'
    VenueCompletenessCheck:
      type: object
      properties:
        key:
          type: string
          description: PHOTOS, COURT, ADDRESS, or PHONE
        label:
          type: string
        done:
          type: boolean

    VenueCounts:
      type: object
      description: Per-tab venue counts for the admin Venues screen badges.
      properties:
        all: { type: integer }
        pending: { type: integer }
        changesRequested: { type: integer }
        approved: { type: integer }
        rejected: { type: integer }

    # ─── Admin Players ────────────────────────────────────────────────────────
    PlayerStats:
      type: object
      properties:
        totalPlayers: { type: integer }
        newThisWeek: { type: integer }
        activeRatePct: { type: integer }
        flaggedCount: { type: integer }
    PlayerRow:
      type: object
      properties:
        playerId: { type: integer, format: int64 }
        name: { type: string }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        avatarUrl: { type: string, nullable: true }
        emailVerified: { type: boolean }
        phoneVerified: { type: boolean }
        status: { type: string, description: ACTIVE/SUSPENDED/BANNED/DELETED }
        riskLevel: { type: string, description: NONE/LOW/MEDIUM/HIGH }
        riskReason: { type: string, nullable: true }
        bookingCount: { type: integer }
        totalSpend: { type: integer }
        lastActiveAt: { type: string, format: date-time, nullable: true }
        joinedAt: { type: string, format: date-time, nullable: true }
    PlayerPage:
      type: object
      properties:
        content:
          type: array
          items: { $ref: '#/components/schemas/PlayerRow' }
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        size: { type: integer }
        number: { type: integer }
    PlayerStatsBlock:
      type: object
      properties:
        bookingCount: { type: integer }
        totalSpend: { type: integer }
        refundCount: { type: integer }
        refundTotal: { type: integer }
        reviewCount: { type: integer }
        cancellationRatePct: { type: integer }
        noShowCount: { type: integer }
    PlayerSuspensionInfo:
      type: object
      properties:
        reason: { type: string, nullable: true }
        until: { type: string, format: date, nullable: true }
    PlayerDeletionInfo:
      type: object
      properties:
        deletedAt: { type: string, format: date-time, nullable: true }
        deletedByName: { type: string, nullable: true }
        reason: { type: string, nullable: true }
    PlayerAdminDetail:
      type: object
      properties:
        playerId: { type: integer, format: int64 }
        name: { type: string }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        avatarUrl: { type: string, nullable: true }
        city: { type: string, nullable: true }
        emailVerified: { type: boolean }
        phoneVerified: { type: boolean }
        status: { type: string }
        riskLevel: { type: string }
        riskReason: { type: string, nullable: true }
        joinedAt: { type: string, format: date-time, nullable: true }
        lastActiveAt: { type: string, format: date-time, nullable: true }
        stats: { $ref: '#/components/schemas/PlayerStatsBlock' }
        suspension:
          allOf:
            - $ref: '#/components/schemas/PlayerSuspensionInfo'
          nullable: true
        deletion:
          allOf:
            - $ref: '#/components/schemas/PlayerDeletionInfo'
          nullable: true
        availableActions:
          type: array
          items: { type: string }
    PlayerBookingRow:
      type: object
      properties:
        bookingId: { type: integer, format: int64 }
        venueName: { type: string }
        date: { type: string, format: date, nullable: true }
        slotLabel: { type: string }
        amount: { type: integer }
        status: { type: string }
    PlayerBookingPage:
      type: object
      properties:
        content:
          type: array
          items: { $ref: '#/components/schemas/PlayerBookingRow' }
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        size: { type: integer }
        number: { type: integer }
    PlayerPaymentRow:
      type: object
      properties:
        paymentId: { type: integer, format: int64 }
        date: { type: string, format: date-time, nullable: true }
        amount: { type: integer }
        methodLabel: { type: string }
        status: { type: string }
        refundedAmount: { type: integer, nullable: true }
    PlayerPaymentPage:
      type: object
      properties:
        content:
          type: array
          items: { $ref: '#/components/schemas/PlayerPaymentRow' }
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        size: { type: integer }
        number: { type: integer }
    PlayerAuditRow:
      type: object
      properties:
        id: { type: integer, format: int64 }
        actorName: { type: string, nullable: true }
        action: { type: string }
        reason: { type: string, nullable: true }
        fromStatus: { type: string, nullable: true }
        toStatus: { type: string, nullable: true }
        createdAt: { type: string, format: date-time, nullable: true }
    PlayerAuditPage:
      type: object
      properties:
        content:
          type: array
          items: { $ref: '#/components/schemas/PlayerAuditRow' }
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        size: { type: integer }
        number: { type: integer }
    PlayerReasonBody:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 1 }
    PlayerSuspendBody:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 1 }
        until: { type: string, format: date, nullable: true }
    PlayerVerificationBody:
      type: object
      required: [channel, verified]
      properties:
        channel: { type: string, description: EMAIL or PHONE }
        verified: { type: boolean }
    PlayerMessageBody:
      type: object
      required: [channels, body]
      properties:
        channels:
          type: array
          items: { type: string, description: IN_APP/EMAIL/SMS }
          minItems: 1
        subject: { type: string, nullable: true }
        body: { type: string, minLength: 1 }

    # ─── Admin Owners ─────────────────────────────────────────────────────────
    OwnerStats:
      type: object
      properties:
        totalOwners: { type: integer }
        newThisWeek: { type: integer }
        activeOwners: { type: integer }      # >=1 live venue
        onboardingOwners: { type: integer }  # no live venue yet
        flaggedCount: { type: integer }
    OwnerRow:
      type: object
      properties:
        ownerId: { type: integer, format: int64 }
        name: { type: string }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        avatarUrl: { type: string, nullable: true }
        emailVerified: { type: boolean }
        phoneVerified: { type: boolean }
        status: { type: string, description: ACTIVE/SUSPENDED/BANNED/DELETED }
        riskLevel: { type: string, description: NONE/LOW/MEDIUM/HIGH }
        riskReason: { type: string, nullable: true }
        totalVenues: { type: integer }
        liveVenues: { type: integer }
        grossBookingValue: { type: integer }  # informational transaction volume
        rating: { type: number, nullable: true }
        lastActiveAt: { type: string, format: date-time, nullable: true }
        joinedAt: { type: string, format: date-time, nullable: true }
    OwnerPage:
      type: object
      properties:
        content:
          type: array
          items: { $ref: '#/components/schemas/OwnerRow' }
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        size: { type: integer }
        number: { type: integer }
    OwnerStatsBlock:
      type: object
      properties:
        totalVenues: { type: integer }
        liveVenues: { type: integer }
        grossBookingValue: { type: integer }
        bookingCount: { type: integer }
        rating: { type: number, nullable: true }
        ownerCancellationRatePct: { type: integer }
        disputeCount: { type: integer }
        refundRatePct: { type: integer }
    OwnerSuspensionInfo:
