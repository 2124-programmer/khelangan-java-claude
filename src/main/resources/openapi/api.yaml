  # ─── Admin Disputes ────────────────────────────────────────────────────────
  /api/v1/admin/disputes:
    get:
      tags: [AdminDisputes]
      summary: List disputes (triage queue)
      operationId: listAdminDisputes
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: status, in: query, explode: true, schema: { type: array, items: { $ref: '#/components/schemas/DisputeStatus' } } }
        - { name: category, in: query, explode: true, schema: { type: array, items: { $ref: '#/components/schemas/DisputeCategory' } } }
        - { name: priority, in: query, schema: { type: string, enum: [LOW, MEDIUM, HIGH] } }
        - { name: assigned, in: query, schema: { type: string, enum: [ME, UNASSIGNED, ANYONE], default: ANYONE } }
        - { name: sort, in: query, schema: { type: string, enum: [OLDEST, NEWEST, PRIORITY, LONGEST_WAITING], default: PRIORITY } }
        - { name: page, in: query, schema: { type: integer, default: 0 } }
        - { name: size, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/AdminDisputePage' } } } }

  /api/v1/admin/disputes/stats:
    get:
      tags: [AdminDisputes]
      operationId: getDisputeStats
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DisputeStats' } } } }

  /api/v1/admin/disputes/{disputeId}:
    get:
      tags: [AdminDisputes]
      operationId: getDisputeDetail
      parameters: [ { name: disputeId, in: path, required: true, schema: { type: integer, format: int64 } } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DisputeDetail' } } } }
        '404': { description: Not found }

  /api/v1/admin/disputes/{disputeId}/assign:
    post:
      tags: [AdminDisputes]
      operationId: assignDispute
      parameters: [ { name: disputeId, in: path, required: true, schema: { type: integer, format: int64 } } ]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                adminId: { type: integer, format: int64, nullable: true }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DisputeDetail' } } } }

  /api/v1/admin/disputes/{disputeId}/message:
    post:
      tags: [AdminDisputes]
      summary: Send a message into the party-visible conversation
      operationId: messageDisputeParty
      parameters: [ { name: disputeId, in: path, required: true, schema: { type: integer, format: int64 } } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [audience, channels, body]
              properties:
                audience: { type: string, enum: [PLAYER, OWNER, BOTH] }
                channels: { type: array, items: { type: string, description: IN_APP/EMAIL/SMS }, minItems: 1 }
                body: { type: string, minLength: 1 }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DisputeDetail' } } } }

  /api/v1/admin/disputes/{disputeId}/request-info:
    post:
      tags: [AdminDisputes]
      operationId: requestDisputeInfo
      parameters: [ { name: disputeId, in: path, required: true, schema: { type: integer, format: int64 } } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [party, message]
              properties:
                party: { $ref: '#/components/schemas/PartyRole' }
                message: { type: string, minLength: 1 }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DisputeDetail' } } } }

  /api/v1/admin/disputes/{disputeId}/notes:
    post:
      tags: [AdminDisputes]
      summary: Add an admin-only internal note (never sent to parties)
      operationId: addDisputeNote
      parameters: [ { name: disputeId, in: path, required: true, schema: { type: integer, format: int64 } } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, minLength: 1 }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DisputeDetail' } } } }

  /api/v1/admin/disputes/{disputeId}/resolve:
    post:
      tags: [AdminDisputes]
      operationId: adminResolveDispute
      parameters: [ { name: disputeId, in: path, required: true, schema: { type: integer, format: int64 } } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/DisputeResolveBody' } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DisputeDetail' } } } }
        '403': { description: Caller lacks capability for the requested consequence }

  /api/v1/admin/disputes/{disputeId}/dismiss:
    post:
      tags: [AdminDisputes]
      operationId: dismissDispute
      parameters: [ { name: disputeId, in: path, required: true, schema: { type: integer, format: int64 } } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/DisputeReasonBody' } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DisputeDetail' } } } }

  /api/v1/admin/disputes/{disputeId}/reopen:
    post:
      tags: [AdminDisputes]
      operationId: reopenDispute
      parameters: [ { name: disputeId, in: path, required: true, schema: { type: integer, format: int64 } } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/DisputeReasonBody' } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/DisputeDetail' } } } }

  /api/v1/admin/venues:
    get:
      tags: [Admin]
      summary: List/search venues (Admin — unified registry + moderation queue)
      operationId: adminListVenues
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          description: ALL, PENDING, CHANGES_REQUESTED, APPROVED, REJECTED (or a raw VenueStatus). ALL/blank excludes DRAFT.
          schema:
            type: string
        - name: q
          in: query
          description: Search across venue name, owner name, address, and city.
          schema:
            type: string
      responses:
        '200':
          description: Page of venues
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueSummaryPage'

  /api/v1/admin/venues/counts:
    get:
      tags: [Admin]
      summary: Per-tab venue counts (Admin)
      operationId: adminVenueCounts
      responses:
        '200':
          description: Venue counts per tab
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueCounts'

  /api/v1/admin/venues/{id}:
    get:
      tags: [Admin]
      summary: Get full venue detail with owner context (Admin)
      description: >-
        ADMIN-scoped full venue detail for a venue in ANY status (incl. PENDING/DRAFT/REJECTED),
        plus owner contact and venue history. Use this to review a pending venue before approving.
      operationId: adminGetVenue
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Venue detail with admin context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminVenueDetailDto'
        '404':
          description: Not found

  /api/v1/owner/venues/{venueId}/submit:
    post:
      tags: [Venues]
      summary: Submit (or resubmit) a venue for approval (Owner)
      description: >-
        Moves a DRAFT or CHANGES_REQUESTED venue into PENDING. Requires at least one court.
        Venues with ≤2 courts submit free (Starter tier defaulted). Venues with >2 courts must
        pass a `planId` whose plan.maxCourts ≥ court count (422 otherwise); that tier is stored
        as the venue's intended plan and used for the auto-trial on approval.
      operationId: submitVenue
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitVenueRequest'
      responses:
        '200':
          description: Venue submitted (now PENDING)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueDetailDto'
        '422':
          description: Court count exceeds the free threshold and no qualifying tier was selected

