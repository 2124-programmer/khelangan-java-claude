              schema:
                $ref: '#/components/schemas/VenueSubscriptionState'
        '409':
          description: Not eligible (typed code in error/details.code)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/owner/venues/{venueId}/subscription-requests:
    post:
