          type: number
          nullable: true
        trendDirection:
          allOf:
            - $ref: '#/components/schemas/TrendDirection'
          nullable: true

    MrrMetric:
      type: object
      required: [amount, activeSubscriptions]
      properties:
        amount:
          type: integer
          format: int64
        activeSubscriptions:
          type: integer
          format: int64
        trendPct:
          type: number
          nullable: true
        trendDirection:
          allOf:
            - $ref: '#/components/schemas/TrendDirection'
          nullable: true

    NeedsAttentionItem:
      type: object
      required: [key, label, count, tone, deepLinkScreen]
      properties:
        key:
          $ref: '#/components/schemas/NeedsAttentionKey'
        label:
          type: string
        count:
          type: integer
          format: int64
        tone:
          $ref: '#/components/schemas/DashboardTone'
        deepLinkScreen:
          type: string
        deepLinkParams:
          type: object
          additionalProperties:
            type: string
          nullable: true

    ManagementCounts:
      type: object
      properties:
        venues:
          type: integer
          format: int64
        players:
          type: integer
          format: int64
        owners:
          type: integer
          format: int64
        bookings:
          type: integer
          format: int64
        openDisputes:
          type: integer
          format: int64
        activeCoupons:
          type: integer
          format: int64

    DashboardSummary:
      type: object
      required: [asOf, period, bookingsThisPeriod, newSignupsThisPeriod, activeVenues, pendingModeration, needsAttention, counts, canViewFinancials]
      properties:
        asOf:
          type: string
          format: date-time
        period:
          $ref: '#/components/schemas/DashboardPeriod'
        canViewFinancials:
          type: boolean
        mrr:
          allOf:
            - $ref: '#/components/schemas/MrrMetric'
          nullable: true
        revenueThisPeriod:
          allOf:
            - $ref: '#/components/schemas/MoneyMetric'
          nullable: true
        gbvThisPeriod:
          allOf:
            - $ref: '#/components/schemas/MoneyMetric'
          nullable: true
        bookingsThisPeriod:
          $ref: '#/components/schemas/CountMetric'
        newSignupsThisPeriod:
          $ref: '#/components/schemas/CountMetric'
        activeVenues:
          $ref: '#/components/schemas/CountMetric'
        pendingModeration:
          $ref: '#/components/schemas/CountMetric'
        needsAttention:
          type: array
          items:
            $ref: '#/components/schemas/NeedsAttentionItem'
        counts:
          $ref: '#/components/schemas/ManagementCounts'

    OwnerStatsDto:
      type: object
      properties:
        todayBookings:
          type: integer
          format: int64
        todayRevenue:
          type: integer
          format: int64
        weekRevenue:
          type: integer
          format: int64
        monthRevenue:
          type: integer
          format: int64
        pendingPayout:
          type: integer
          format: int64

    # ─── Owner Dashboard Summary ─────────────────────────────────────────────
    OwnerDashboardSummary:
      type: object
      required: [earnings, bookings, stats]
      properties:
        earnings:
          $ref: '#/components/schemas/DashboardEarnings'
        bookings:
          $ref: '#/components/schemas/DashboardBookingCounts'
        stats:
          $ref: '#/components/schemas/DashboardStats'

    DashboardEarnings:
      type: object
      required: [todayAmount, weekAmount, monthAmount, pendingAmount, todayBookingCount]
      properties:
        todayAmount:
          type: integer
          format: int64
        weekAmount:
          type: integer
          format: int64
        monthAmount:
          type: integer
          format: int64
        pendingAmount:
          type: integer
          format: int64
        todayBookingCount:
          type: integer
          format: int64

    DashboardBookingCounts:
      type: object
      required: [requests, today, upcoming, completedLast30Days, cancelledLast30Days]
      properties:
        requests:
          type: integer
          format: int64
        today:
          type: integer
          format: int64
        upcoming:
          type: integer
          format: int64
        completedLast30Days:
          type: integer
          format: int64
        cancelledLast30Days:
          type: integer
          format: int64

    DashboardStats:
      type: object
      required: [usersConnected, venueCount, courtCount]
      properties:
        usersConnected:
          type: integer
          format: int64
        venueCount:
          type: integer
          format: int64
        courtCount:
          type: integer
          format: int64

    # ─── Platform Settings ───────────────────────────────────────────────────
    PlatformSettingsDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        commissionPercent:
          type: integer
        convenienceFee:
          type: integer
        maintenanceMode:
          type: boolean
        autoApproveVenues:
          type: boolean

    UpdateSettingsRequest:
      type: object
      properties:
        commissionPercent:
          type: integer
          minimum: 0
          maximum: 100
        convenienceFee:
          type: integer
          minimum: 0
        maintenanceMode:
          type: boolean
        autoApproveVenues:
          type: boolean

    # ─── Error ──────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      properties:
        field:
          type: string
        message:
          type: string

    EmailChangeRequestDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        currentEmail:
          type: string
        newEmail:
          type: string
        status:
          type: string
          enum: [PENDING_VERIFICATION, PENDING, APPROVED, REJECTED]
        createdAt:
          type: string
          format: date-time
        decidedAt:
          type: string
          format: date-time
        reason:
          type: string

    # ─── Subscriptions ────────────────────────────────────────────────────────
    # Response DTOs use plain strings for enum-valued fields (matching the rest of
    # this spec); request bodies keep enums so invalid input is rejected with 400.
    # FeatureCode values: AUTO_ACCEPT, OFFERS, ANALYTICS, ADVANCED_ANALYTICS,
    # PRIORITY_PLACEMENT, FEATURED_BADGE, PRIORITY_SUPPORT.
    SubscriptionPlan:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
          description: One of STARTER, GROWTH, PRO, PRO_MAX
        name:
          type: string
        maxCourts:
          type: integer
        priceMonthly:
          type: integer
        priceAnnual:
          type: integer
        currency:
          type: string
        features:
          type: array
          items:
            type: string
        photoLimit:
          type: integer
        placementWeight:
          type: integer
        trialDays:
          type: integer
        active:
          type: boolean
        displayOrder:
          type: integer

    UpdatePlanRequest:
      type: object
      description: Admin catalog edit. Code is immutable; omit a field to leave it unchanged.
      properties:
        name:
          type: string
        maxCourts:
          type: integer
          minimum: 1
        priceMonthly:
          type: integer
          minimum: 0
        priceAnnual:
          type: integer
          minimum: 0
        features:
          type: array
          description: FeatureCode values. Unknown values are rejected.
          items:
            type: string
        photoLimit:
          type: integer
          minimum: 0
        placementWeight:
          type: integer
          minimum: 0
        trialDays:
          type: integer
          minimum: 0
        active:
          type: boolean
        displayOrder:
          type: integer

    Subscription:
      type: object
      description: >
        A venue subscription. Carries snapshot fields (planCode, planName, price,
        maxCourts, features) so history stays accurate if the catalog later changes.
        All period dates are computed and owned by the server.
      properties:
        id:
          type: integer
          format: int64
        ownerId:
          type: integer
          format: int64
        venueId:
          type: integer
          format: int64
        planId:
          type: integer
          format: int64
        planCode:
          type: string
        planName:
          type: string
        billingCycle:
          type: string
          description: MONTHLY or ANNUAL
        status:
          type: string
          description: TRIALING, ACTIVE, PAST_DUE, EXPIRED, CANCELED, or VOIDED
        periodStart:
          type: string
          format: date-time
        periodEnd:
          type: string
          format: date-time
        trialEnd:
          type: string
          format: date-time
          nullable: true
        price:
          type: integer
        currency:
          type: string
        maxCourts:
          type: integer
        coveredCourtIds:
          type: array
          items: { type: string }
          description: Court ids this subscription makes bookable (≤ maxCourts).
        coveredCourtNames:
          type: array
          items: { type: string }
          description: Human-readable names for coveredCourtIds.
        features:
          type: array
          items:
            type: string
        activationSource:
          type: string
          description: ADMIN_MANUAL or PROVIDER
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SubscriptionCreateRequest:
      type: object
      description: Admin manual activation. Contains NO date fields — the server computes all periods.
      required: [ownerId, venueId, planId, billingCycle]
      properties:
        ownerId:
          type: integer
          format: int64
        venueId:
          type: integer
          format: int64
        planId:
          type: integer
          format: int64
        billingCycle:
          type: string
          enum: [MONTHLY, ANNUAL]
        asTrial:
          type: boolean
          default: false
        paymentMethod:
          type: string
          enum: [CASH, UPI_OFFLINE, BANK_TRANSFER, PROVIDER]
        paymentReference:
          type: string
        notes:
          type: string

    SubscriptionEditRequest:
      type: object
      description: Admin correction of plan/cycle. Contains NO date fields — the server recomputes periods.
      properties:
        planId:
          type: integer
          format: int64
        billingCycle:
          type: string
          enum: [MONTHLY, ANNUAL]
        notes:
          type: string

    SubscriptionPayment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        subscriptionId:
          type: integer
          format: int64
        amount:
          type: integer
        currency:
          type: string
        method:
          type: string
          description: CASH, UPI_OFFLINE, BANK_TRANSFER, or PROVIDER
        status:
          type: string
          description: RECORDED, PENDING, or FAILED
        paidAt:
          type: string
          format: date-time
        recordedByAdminId:
          type: integer
          format: int64
          nullable: true
        reference:
          type: string

    SubscriptionChangeRequest:
      type: object
      properties:
        id:
          type: integer
          format: int64
        ownerId:
          type: integer
          format: int64
        venueId:
          type: integer
          format: int64
        venueName:
          type: string
        venueCity:
          type: string
          nullable: true
        ownerName:
          type: string
        ownerEmail:
          type: string
          nullable: true
        currentSubscriptionId:
          type: integer
          format: int64
          nullable: true
        currentPlanName:
          type: string
          nullable: true
        requestedPlanId:
          type: integer
          format: int64
        requestedPlanCode:
          type: string
        requestedPlanName:
          type: string
        requestedPlanPrice:
          type: integer
          description: Price for the requested billing cycle (₹)
        requestedPlanMaxCourts:
          type: integer
        requestedCycle:
          type: string
          description: MONTHLY or ANNUAL
        status:
          type: string
          description: PENDING, APPROVED, REJECTED, or CANCELLED
        coveredCourtIds:
          type: array
          items: { type: string }
          description: Court ids the owner selected to cover with the requested plan.
        coveredCourtNames:
          type: array
          items: { type: string }
          description: Human-readable names for coveredCourtIds (admin display).
        createdAt:
          type: string
          format: date-time
          description: When the owner submitted the request.
        decidedAt:
          type: string
          format: date-time
          nullable: true
          description: When an admin approved/rejected the request (null while pending).
        reason:
          type: string

    VenueSubscriptionView:
      type: object
      description: >
        Owner/admin view of a venue's subscription state, usage, and recent history.
        The venue / owner / timeline blocks are populated only on the admin detail endpoint.
      properties:
        current:
          allOf:
            - $ref: '#/components/schemas/Subscription'
          nullable: true
        courtsUsed:
          type: integer
        courtsAllowed:
          type: integer
        history:
          type: array
          items:
            $ref: '#/components/schemas/Subscription'
        pendingChangeRequest:
          allOf:
            - $ref: '#/components/schemas/SubscriptionChangeRequest'
          nullable: true
        venue:
          allOf:
            - $ref: '#/components/schemas/SubscriptionVenueRef'
          nullable: true
        owner:
          allOf:
            - $ref: '#/components/schemas/SubscriptionOwnerRef'
          nullable: true
        timeline:
          allOf:
            - $ref: '#/components/schemas/SubscriptionTimeline'
          nullable: true

    SubscriptionVenueRef:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        city: { type: string, nullable: true }
        courtCount: { type: integer }
        registeredAt: { type: string, format: date-time, nullable: true }
        approvedAt: { type: string, format: date-time, nullable: true }

    SubscriptionOwnerRef:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        mobile: { type: string, nullable: true }
        email: { type: string, nullable: true }

    StageKey:
      type: string
      enum: [REGISTERED, APPROVED, TRIAL_ACTIVATED, SUBSCRIPTION]
    StageState:
      type: string
      enum: [COMPLETED, LIVE, PENDING]
    TimelineStage:
      type: object
      properties:
        key: { $ref: '#/components/schemas/StageKey' }
        label: { type: string }
        occurredAt: { type: string, format: date-time, nullable: true }
        state: { $ref: '#/components/schemas/StageState' }
    SubscriptionTimeline:
      type: object
      properties:
        stages:
          type: array
          items:
            $ref: '#/components/schemas/TimelineStage'
        liveStageKey:
          allOf:
            - $ref: '#/components/schemas/StageKey'
          nullable: true

    VenueSubscriptionRow:
      type: object
      description: One row in the admin venue-subscription table.
      properties:
        venueId: { type: integer, format: int64 }
        venueName: { type: string }
        venueCity: { type: string, nullable: true }
        ownerName: { type: string }
        ownerMobile: { type: string, nullable: true }
        currentPlanCode: { type: string, nullable: true }
        currentPlanName: { type: string, nullable: true }
        currentStatus:
          type: string
          description: ACTIVE, TRIAL, EXPIRING, EXPIRED, or NONE (row-level rollup)
        endDate: { type: string, format: date-time, nullable: true }
        courtsUsed: { type: integer }
        courtLimit: { type: integer, nullable: true }
        pendingRequestId: { type: integer, format: int64, nullable: true }
        pendingCurrentPlanName: { type: string, nullable: true }
        pendingRequestedPlanName: { type: string, nullable: true }
    VenueSubscriptionPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/VenueSubscriptionRow'
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        size: { type: integer }
        number: { type: integer }

    SubscriptionPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Subscription'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    UpgradeRequestCreate:
      type: object
      required: [requestedPlanId, billingCycle]
      properties:
        requestedPlanId:
          type: integer
          format: int64
        billingCycle:
          type: string
          enum: [MONTHLY, ANNUAL]

    RejectChangeRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    ActivateChangeRequest:
      type: object
      description: >-
        Optional admin overrides applied when approving a change request. `courtIds` replaces the
        owner's requested court coverage (must be ≤ the plan limit and belong to the venue). Omit the
        body entirely to keep the owner's selection.
      properties:
        courtIds:
          type: array
          nullable: true
          items: { type: string }
          description: Court ids the activated subscription should cover. Null/absent keeps the owner's selection.

    # ─── Owner subscription purchase + court coverage ──────────────────────────
    PlanOption:
      type: object
      description: >
        One purchasable option shown in the owner plan sheet: the self-serve Trial plus the paid
        tiers. courtLimit is the cap on how many courts the owner may cover under this plan.
      required: [code, name, kind, price, courtLimit, durationDays, oncePerVenue, available]
      properties:
        code: { type: string, enum: [TRIAL, STARTER, GROWTH, PRO, PRO_MAX] }
        name: { type: string }
        kind: { type: string, enum: [TRIAL, PAID] }
        price: { type: integer, description: "₹, 0 for Trial" }
        courtLimit: { type: integer }
        durationDays: { type: integer }
        oncePerVenue: { type: boolean, description: "True for Trial" }
        available: { type: boolean, description: "False when this option can't be chosen now (e.g. Trial already used)." }
        unavailableReason: { type: string, nullable: true }

    SelectableCourt:
      type: object
      description: A court rendered in the court-selection sheet (with active + currently-covered flags).
      required: [courtId, name, isActive, isCovered]
      properties:
        courtId: { type: string }
        name: { type: string }
        sport: { type: string, nullable: true }
        isActive: { type: boolean }
        isCovered: { type: boolean, description: "Already covered by the current subscription." }

    PendingRequestRef:
      type: object
      properties:
        requestId: { type: string }
        planCode: { type: string }
        planName: { type: string, nullable: true }
        coveredCourtIds: { type: array, items: { type: string } }
        coveredCourtNames: { type: array, items: { type: string } }
        requestedAt: { type: string, format: date-time, nullable: true }

    VenueSubscriptionState:
      type: object
      description: >
        Owner-facing subscription state + purchase eligibility for one venue, driving the
        Subscription card and the plan/court-selection sheets. Server-authoritative.
      required: [venueId, status, totalCourts, bookableCourts, trialUsed, canStartTrial, canPurchasePaid, blockReason, coveredCourtIds]
      properties:
        venueId: { type: string }
        kind: { type: string, enum: [TRIAL, PAID], nullable: true }
        planCode: { type: string, nullable: true }
        planName: { type: string, nullable: true }
        status: { type: string, enum: [TRIAL, ACTIVE, EXPIRED, CANCELED, NONE] }
        startDate: { type: string, format: date, nullable: true }
        endDate: { type: string, format: date, nullable: true }
        courtLimit: { type: integer, nullable: true }
        coveredCourtIds: { type: array, items: { type: string } }
        coveredCourtNames: { type: array, items: { type: string } }
        updatedAt: { type: string, format: date-time, nullable: true, description: "When the current subscription last changed (drives the owner 'last updated' line)." }
        totalCourts: { type: integer }
        bookableCourts: { type: integer }
        trialUsed: { type: boolean }
        canStartTrial: { type: boolean }
        canPurchasePaid: { type: boolean }
        blockReason: { type: string, enum: [NONE, NO_COURTS] }
        pendingRequest:
          allOf:
            - $ref: '#/components/schemas/PendingRequestRef'
          nullable: true

    CourtSelectionBody:
      type: object
      required: [courtIds]
      properties:
        courtIds:
          type: array
          items: { type: string }
          minItems: 1

    PaidRequestBody:
      type: object
      required: [planCode, courtIds]
      properties:
        planCode: { type: string, enum: [STARTER, GROWTH, PRO, PRO_MAX] }
        courtIds:
          type: array
          items: { type: string }
          minItems: 1

    SubscriptionRequestView:
      type: object
      properties:
        requestId: { type: string }
        venueId: { type: string }
        planCode: { type: string }
        coveredCourtIds: { type: array, items: { type: string } }
        status: { type: string, enum: [PENDING, APPROVED, REJECTED, CANCELLED] }
        requestedAt: { type: string, format: date-time }

paths:
  # ─── Auth ─────────────────────────────────────────────────────────────────
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/otp/send:
    post:
      tags: [Auth]
      summary: Request OTP (email → SMS to registered phone)
      operationId: sendOtp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpSendRequest'
      responses:
        '200':
          description: OTP dispatched (or silently no-op for unknown email to avoid enumeration)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpSendResponse'
        '400':
          description: Validation error (missing/invalid email)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP and obtain JWT
      operationId: verifyOtp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyRequest'
      responses:
        '200':
          description: OTP verified — JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid/expired OTP or too many attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Forgot password
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Reset email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  # ─── Auth Security (standalone — not generated into AuthApi) ─────────────
  /api/v1/auth/change-password:
    post:
      tags: [AuthSecurity]
      summary: Change password (authenticated)
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password changed; fresh JWT returned for current device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Current password incorrect
        '400':
          description: Weak/invalid password or same as current
        '429':
          description: Rate-limited

  /api/v1/auth/password-reset/request:
    post:
      tags: [AuthSecurity]
      summary: Request password reset via email OTP (enumeration-safe)
      operationId: requestPasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Generic success (same response whether email exists or not)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/v1/auth/password-reset/verify:
    post:
      tags: [AuthSecurity]
      summary: Verify password-reset OTP; returns a single-use reset token
      operationId: verifyPasswordResetOtp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        '200':
          description: OTP verified; returns short-lived reset token
          content:
            application/json:
              schema:
                type: object
                properties:
                  resetToken:
                    type: string
        '400':
          description: Invalid / expired OTP or too many attempts

  /api/v1/auth/password-reset/confirm:
    post:
      tags: [AuthSecurity]
      summary: Set new password using the reset token
      operationId: confirmPasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resetToken, newPassword]
              properties:
                resetToken:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid/expired reset token or weak password

  # ─── Email Change (owner → admin approval) ────────────────────────────────
  /api/v1/owner/email-change-requests:
    post:
      tags: [EmailChange]
      summary: Owner submits new email — sends OTP to new address
      operationId: createEmailChangeRequest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newEmail]
              properties:
                newEmail:
                  type: string
                  format: email
      responses:
        '200':
          description: OTP sent to new email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '409':
          description: Email already in use or pending request exists

  /api/v1/owner/email-change-requests/verify:
    post:
      tags: [EmailChange]
      summary: Owner verifies new-email OTP — request moves to PENDING
      operationId: verifyEmailChangeOtp
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otp]
              properties:
                otp:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        '200':
          description: OTP verified; request now in admin queue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailChangeRequestDto'

  /api/v1/owner/email-change-requests/me:
    get:
      tags: [EmailChange]
      summary: Get current email-change request status
      operationId: getEmailChangeStatus
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Latest request or 204 if none
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailChangeRequestDto'
        '204':
          description: No request on file

  # ─── Users ────────────────────────────────────────────────────────────────
  /api/v1/users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      operationId: getMe
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'
    put:
      tags: [Users]
      summary: Update current user profile
      operationId: updateMe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'

  /api/v1/users/me/role:
    patch:
      tags: [Users]
      summary: Change own account role (PLAYER ↔ OWNER)
      description: >
        Self-service role change with password re-authentication.
        Cannot elevate to ADMIN. Returns a fresh JWT with the new role
        so the change takes effect immediately without requiring a separate login.
      operationId: changeMyRole
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeRoleRequest'
      responses:
        '200':
          description: Role changed; new JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: No-op (already that role) or invalid target role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Wrong password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/admin/users:
    get:
      tags: [Admin]
      summary: List all users (Admin)
