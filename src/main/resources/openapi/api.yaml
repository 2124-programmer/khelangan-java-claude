        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: role
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Page of users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPage'

  /api/v1/admin/users/{id}/block:
    patch:
      tags: [Admin]
      summary: Block user (Admin)
      operationId: blockUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Blocked user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDto'

  /api/v1/admin/users/{id}/unblock:
    patch:
      tags: [Admin]
      summary: Unblock user (Admin)
      operationId: unblockUser
      parameters:
        - name: id
          in: path
