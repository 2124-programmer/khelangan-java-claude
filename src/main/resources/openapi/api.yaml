      responses:
        '200':
          description: Updated court
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CourtDto'
    delete:
      tags: [Courts]
      summary: Delete court (Owner)
      operationId: deleteCourt
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: courtId
          in: path
          required: true
          schema:
            type: integer
            format: int64
