openapi: 3.0.3
info:
  title: TurfBook API
  description: TurfBook – Sports Venue Booking Marketplace REST API
  version: 1.0.0
  contact:
    name: TurfBook Team
    email: support@turfbook.com

servers:
  - url: http://localhost:8080
    description: Local development server

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ─── Auth ───────────────────────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [name, email, phone, password, role]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 7
          maxLength: 20
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [PLAYER, OWNER]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    OtpSendRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          description: Account email. Backend looks up the registered phone and sends OTP there.

    OtpSendResponse:
      type: object
      properties:
        maskedDestination:
          type: string
          description: Masked phone number showing where the code was sent, e.g. +91•••••3210
        expiresInSec:
          type: integer
          description: Seconds until the OTP expires (300 = 5 min)
        resendAfterSec:
          type: integer
          description: Seconds to wait before requesting a new code (0 = resend allowed now)

    OtpVerifyRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          minLength: 6
          maxLength: 6

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/UserDto'

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    UnreadCountResponse:
      type: object
      properties:
        count:
          type: integer
          format: int64

    # ─── User ───────────────────────────────────────────────────────────────
    UserDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          type: string
        avatarUrl:
          type: string
        preferredSports:
          type: array
          items:
            type: string
        totalBookings:
          type: integer
        isPremium:
          type: boolean
        isBlocked:
          type: boolean
        createdAt:
          type: string
          format: date-time

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        phone:
          type: string
        avatarUrl:
          type: string
        preferredSports:
          type: array
          items:
            type: string

    ChangeRoleRequest:
      type: object
      required: [targetRole, password]
      properties:
        targetRole:
          type: string
          enum: [PLAYER, OWNER]
          description: The role to switch to. ADMIN is not self-assignable.
        password:
          type: string
          minLength: 6
          description: Current password for re-authentication before role change.

    UserPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/UserDto'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    # ─── Sport ──────────────────────────────────────────────────────────────
    SportDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        icon:
          type: string

    CreateSportRequest:
      type: object
      required: [name, icon]
      properties:
        name:
          type: string
        icon:
          type: string

    UpdateSportRequest:
      type: object
      properties:
        name:
          type: string
        icon:
          type: string

    # ─── Venue ──────────────────────────────────────────────────────────────
    VenueSummaryDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        pincode:
          type: string
        status:
          type: string
        ratingAverage:
          type: number
          format: double
          nullable: true
          description: Average star rating (1–5). null when no reviews exist yet.
        ratingCount:
          type: integer
          format: int64
          description: Total number of reviews.
        pricePerHour:
          type: integer
          description: Venue-level default price per hour (₹)
        openTime:
          type: string
          description: First bookable hour in HH:00 format (e.g. "05:00")
          example: "05:00"
        closeTime:
          type: string
          description: Last slot ends at this hour in HH:00 format (e.g. "23:00")
          example: "23:00"
        isActive:
          type: boolean
        coverPhoto:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        ownerId:
          type: integer
          format: int64
        sports:
          type: array
          items:
            $ref: '#/components/schemas/SportDto'
        amenities:
          type: array
          items:
            type: string
        courtCount:
          type: integer
          format: int64
          description: Number of courts belonging to this venue (owner list only)
        featured:
          type: boolean
          description: True when the venue's active plan grants the featured badge
        createdAt:
          type: string
          format: date-time
          description: When the venue was submitted/registered (used for submission age and oldest-first ordering)
        subscription:
          $ref: '#/components/schemas/VenueSubscriptionSummary'

    VenueSubscriptionSummary:
      type: object
      description: Compact plan + remaining-days data for the owner status badge (server-computed, IST).
      properties:
        planCode:
          type: string
        planName:
          type: string
        status:
          type: string
          description: TRIALING, ACTIVE, PAST_DUE, EXPIRED, CANCELED, or VOIDED
        effectiveEnd:
          type: string
          format: date-time
          nullable: true
          description: trialEnd when trialing, else periodEnd.
        remainingDays:
          type: integer
          description: Whole days from now (IST) until effectiveEnd; 0 when past.
        expiringSoon:
          type: boolean
          description: True when remainingDays is at/below the soon threshold (7).

    VenueDetailDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        pincode:
          type: string
        description:
          type: string
        contactPhone:
          type: string
          description: Venue business phone — safe to show to players
        status:
          type: string
        ratingAverage:
          type: number
          format: double
          nullable: true
          description: Average star rating (1–5). null when no reviews exist yet.
        ratingCount:
          type: integer
          format: int64
          description: Total number of reviews.
        pricePerHour:
          type: integer
          description: Venue-level default price per hour (₹)
        openTime:
          type: string
          description: First bookable hour in HH:00 format
          example: "05:00"
        closeTime:
          type: string
          description: Last slot ends at this hour in HH:00 format
          example: "23:00"
        isActive:
          type: boolean
        coverPhoto:
          type: string
        photos:
          type: array
          items:
            type: string
        amenities:
          type: array
          items:
            type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        ownerId:
          type: integer
          format: int64
        sports:
          type: array
          items:
            $ref: '#/components/schemas/SportDto'
        courts:
          type: array
          items:
            $ref: '#/components/schemas/CourtDto'
        createdAt:
          type: string
          format: date-time
        approvalComments:
          type: array
          description: >-
            Approval thread (submit/changes-requested/reject/resubmit/approve).
            Populated only for the venue's owner or an ADMIN; empty for public/player calls.
          items:
            $ref: '#/components/schemas/VenueApprovalComment'

    CreateVenueRequest:
      type: object
      required: [name, address, city, pricePerHour, openTime, closeTime, contactPhone, sportIds]
      properties:
        name:
          type: string
          maxLength: 200
        address:
          type: string
          description: Street address / line 1
        city:
          type: string
        state:
          type: string
        pincode:
          type: string
          description: 6-digit Indian postal code
          pattern: '^\d{6}$'
        description:
          type: string
        contactPhone:
          type: string
          description: 10-digit Indian mobile number
          pattern: '^[6-9]\d{9}$'
        contactEmail:
          type: string
          format: email
        openTime:
          type: string
          description: Opening hour in HH:00 format; minutes must be 00
          example: "05:00"
        closeTime:
          type: string
          description: Closing hour in HH:00 format; must be after openTime
          example: "23:00"
        pricePerHour:
          type: integer
          minimum: 0
          description: Default price per hour in ₹
        amenities:
          type: array
          items:
            type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        sportIds:
          type: array
          minItems: 1
          items:
            type: integer
            format: int64
        coverPhoto:
          type: string
        photos:
          type: array
          items:
            type: string
        isActive:
          type: boolean
          default: true
        courts:
          type: array
          items:
            $ref: '#/components/schemas/CreateCourtRequest'

    UpdateVenueRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        contactPhone:
          type: string
          pattern: '^[6-9]\d{9}$'
        contactEmail:
          type: string
          format: email
        state:
          type: string
        pincode:
          type: string
          pattern: '^\d{6}$'
        openTime:
          type: string
          example: "05:00"
        closeTime:
          type: string
          example: "23:00"
        pricePerHour:
          type: integer
          minimum: 0
        amenities:
          type: array
          items:
            type: string
        address:
          type: string
        city:
          type: string
        lat:
          type: number
          format: double
        lng:
          type: number
          format: double
        sportIds:
          type: array
          items:
            type: integer
            format: int64
        coverPhoto:
          type: string
        photos:
          type: array
          items:
            type: string
        isActive:
          type: boolean

    VenueStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [DRAFT, PENDING, LIVE, REJECTED, SUSPENDED, CHANGES_REQUESTED]
        rejectionReason:
          type: string
          description: >-
            Owner-facing message. Required when REJECTED (why) or CHANGES_REQUESTED
            (what to fix); recorded in the venue's approval comment history.

    SubmitVenueRequest:
      type: object
      description: Optional body for submit-for-approval. planId is required only when the venue has >2 courts.
      properties:
        planId:
          type: integer
          format: int64
          description: The qualifying tier (plan.maxCourts ≥ court count) for venues over the free threshold.

    AdminOwnerDto:
      type: object
      description: Owner contact + account context, ADMIN-scoped (never returned on public routes).
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        registeredOn:
          type: string
          format: date-time
          description: When the owner's account was created.

    OwnerVenueHistoryDto:
      type: object
      description: Aggregate counts of the owner's venues, so the admin can gauge trust.
      properties:
        totalVenues:
          type: integer
          format: int64
        liveVenues:
          type: integer
          format: int64

    VenueApprovalComment:
      type: object
      description: One entry in a venue's approval thread (submit / changes-requested / reject / resubmit / approve).
      properties:
        id:
          type: integer
          format: int64
        action:
          type: string
          description: SUBMITTED, CHANGES_REQUESTED, REJECTED, RESUBMITTED, or APPROVED
        authorRole:
          type: string
          description: ADMIN or OWNER
        comment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    AdminVenueDetailDto:
      type: object
      description: >-
        Full venue listing (same data players see) plus ADMIN-only owner context.
        Returned by GET /api/v1/admin/venues/{id} for venues in any status.
        statusLabel/statusTone/availableActions are derived server-side from the
        venue's status so the client never re-derives moderation rules.
      properties:
        venue:
          $ref: '#/components/schemas/VenueDetailDto'
        owner:
          $ref: '#/components/schemas/AdminOwnerDto'
        ownerHistory:
          $ref: '#/components/schemas/OwnerVenueHistoryDto'
        intendedPlanCode:
          type: string
          nullable: true
          description: Tier the owner committed to at submission (for >2-court venues); null for free ≤2-court venues.
        commentHistory:
          type: array
          items:
            $ref: '#/components/schemas/VenueApprovalComment'
        approvalStatus:
          type: string
          description: PENDING, CHANGES_REQUESTED, APPROVED, or REJECTED (derived from venue status).
        listingStatus:
          type: string
          description: LIVE, UNLISTED, or NONE (derived from venue status).
        statusLabel:
          type: string
          description: Display label — Live / Unlisted / Pending / Draft / Rejected.
        statusTone:
          type: string
          description: GREEN, AMBER, BLUE, RED, or GRAY.
        availableActions:
          type: array
          description: Moderation actions allowed from the current status.
          items:
            type: string
            description: APPROVE, REJECT, SEND_BACK, RECONSIDER, UNLIST, RELIST, or EDIT.
        rejectionReason:
          type: string
          nullable: true
          description: Latest rejection note (when REJECTED).
        changeNotes:
          type: string
          nullable: true
          description: Latest send-back note (when CHANGES_REQUESTED).
        submittedAt:
          type: string
          format: date-time
          nullable: true
        completeness:
          $ref: '#/components/schemas/VenueCompleteness'

    VenueCompleteness:
      type: object
      properties:
        percent:
          type: integer
        checks:
          type: array
          items:
            $ref: '#/components/schemas/VenueCompletenessCheck'
    VenueCompletenessCheck:
      type: object
      properties:
        key:
          type: string
          description: PHOTOS, COURT, ADDRESS, or PHONE
        label:
          type: string
        done:
          type: boolean

    VenueCounts:
      type: object
      description: Per-tab venue counts for the admin Venues screen badges.
      properties:
        all: { type: integer }
        pending: { type: integer }
        changesRequested: { type: integer }
        approved: { type: integer }
        rejected: { type: integer }

    VenueSummaryPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/VenueSummaryDto'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    # ─── Court ──────────────────────────────────────────────────────────────
    CourtDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        venueId:
          type: integer
          format: int64
        name:
          type: string
        sportId:
          type: integer
          format: int64
        type:
          type: string
        pricePerHour:
          type: integer
          nullable: true
          description: Court price per hour. null means inherit from venue.
        peakPrice:
          type: integer
        openTime:
          type: string
          nullable: true
          description: Court open time HH:00. null means inherit from venue.
          example: "06:00"
        closeTime:
          type: string
          nullable: true
          description: Court close time HH:00. null means inherit from venue.
          example: "22:00"
        slotDurationMins:
          type: integer
          default: 60
        isActive:
          type: boolean
        effectivePricePerHour:
          type: integer
          readOnly: true
          description: Resolved price (court override or venue default)
        effectiveOpenTime:
          type: string
          readOnly: true
        effectiveCloseTime:
          type: string
          readOnly: true

    CreateCourtRequest:
      type: object
      required: [name, sportId]
      properties:
        name:
          type: string
          maxLength: 100
        sportId:
          type: integer
          format: int64
          description: Must be one of the parent venue's sportsOffered
        type:
          type: string
        openTime:
          type: string
          nullable: true
          description: Override open time HH:00. Omit or null to inherit venue hours.
          example: "06:00"
        closeTime:
          type: string
          nullable: true
          description: Override close time HH:00. Omit or null to inherit venue hours.
          example: "22:00"
        pricePerHour:
          type: integer
          nullable: true
          minimum: 0
          description: Override price per hour. Omit or null to inherit venue price.
        peakPrice:
          type: integer
          default: 0
        slotDurationMins:
          type: integer
          default: 60
        isActive:
          type: boolean
          default: true

    UpdateCourtRequest:
      type: object
      properties:
        name:
          type: string
        sportId:
          type: integer
          format: int64
        type:
          type: string
        openTime:
          type: string
          nullable: true
        closeTime:
          type: string
          nullable: true
        pricePerHour:
          type: integer
          nullable: true
          minimum: 0
        peakPrice:
          type: integer
        slotDurationMins:
          type: integer
        isActive:
          type: boolean

    # ─── Slot ───────────────────────────────────────────────────────────────
    SlotDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        courtId:
          type: integer
          format: int64
        date:
          type: string
          format: date
        startTime:
          type: string
          format: time
        endTime:
          type: string
          format: time
        status:
          type: string
          enum: [AVAILABLE, BOOKED, BLOCKED, HELD]
        price:
          type: integer

    CourtSlotsDto:
      type: object
      properties:
        courtId:
          type: integer
          format: int64
        courtName:
          type: string
        slots:
          type: array
          items:
            $ref: '#/components/schemas/SlotDto'

    BulkBlockRequest:
      type: object
      required: [date]
      properties:
        date:
          type: string
          format: date

    # ─── Booking ────────────────────────────────────────────────────────────
    BookingDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        playerId:
          type: integer
          format: int64
        playerName:
          type: string
        venueId:
          type: integer
          format: int64
        venueName:
          type: string
        courtId:
          type: integer
          format: int64
        courtName:
          type: string
        slotId:
          type: integer
          format: int64
        sport:
          type: string
        date:
          type: string
          format: date
        startTime:
          type: string
        endTime:
          type: string
        amount:
          type: integer
        convenienceFee:
          type: integer
        discount:
          type: integer
        commission:
          type: integer
        status:
          type: string
        paymentStatus:
          type: string
        couponCode:
          type: string
        hasReview:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the last status change (accepted, checked-in, cancelled, etc.)
        groupId:
          type: string
          nullable: true
        playerPhone:
          type: string
          nullable: true
          description: Player's contact phone (owner-scoped responses only)
        venuePhone:
          type: string
          nullable: true
          description: Venue contact phone (player-scoped responses)
        cancellationReason:
          type: string
          nullable: true
          description: Who or what triggered the cancellation — PLAYER, OWNER, TIME_OVER

    CreateBookingRequest:
      type: object
      required: [venueId, courtId, date, startTime, endTime, sport]
      properties:
        venueId:
          type: integer
          format: int64
        courtId:
          type: integer
          format: int64
        date:
          type: string
          format: date
        startTime:
          type: string
        endTime:
          type: string
        sport:
          type: string
        couponCode:
          type: string
        paymentMethod:
          type: string
          default: CARD

    BulkCreateBookingRequest:
      type: object
      required: [venueId, courtId, date, startTimes, sport]
      properties:
        venueId:
          type: integer
          format: int64
        courtId:
          type: integer
          format: int64
        date:
          type: string
          format: date
          description: Booking date (YYYY-MM-DD)
        startTimes:
          type: array
          description: Start times of each requested slot (HH:mm). Must be contiguous.
          items:
            type: string
          minItems: 1
        sport:
          type: string
        couponCode:
          type: string
        paymentMethod:
          type: string

    BookingPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/BookingDto'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    # ─── Owner Settings ──────────────────────────────────────────────────────
    OwnerSettingsDto:
      type: object
      properties:
        autoAcceptBookings:
          type: boolean
        pushNotificationsEnabled:
          type: boolean

    UpdateOwnerSettingsRequest:
      type: object
      properties:
        autoAcceptBookings:
          type: boolean
        pushNotificationsEnabled:
          type: boolean

    # ─── Review ─────────────────────────────────────────────────────────────
    ReviewDto:
      type: object
      required: [id, venueId, authorName, rating, comment, createdAt, isOwn]
      properties:
        id:
          type: integer
          format: int64
        venueId:
          type: integer
          format: int64
        authorName:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        createdAt:
          type: string
          format: date-time
        isOwn:
          type: boolean
          description: True when the authenticated caller authored this review.
        venueName:
          type: string
          nullable: true
          description: Populated in owner-scoped responses only.

    CreateReviewRequest:
      type: object
      required: [venueId, rating, comment]
      properties:
        venueId:
          type: integer
          format: int64
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          minLength: 1
          maxLength: 1000

    UpdateReviewRequest:
      type: object
      required: [rating, comment]
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
          minLength: 1
          maxLength: 1000

    ReviewPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ReviewDto'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    # ─── Coupon ─────────────────────────────────────────────────────────────
    CouponDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        discountType:
          type: string
        discountValue:
          type: integer
        minBooking:
          type: integer
        maxDiscount:
          type: integer
        validUntil:
          type: string
          format: date
        usedCount:
          type: integer
        maxUses:
          type: integer
        isActive:
          type: boolean

    CreateCouponRequest:
      type: object
      required: [code, discountType, discountValue, minBooking, validUntil, maxUses]
      properties:
        code:
          type: string
        discountType:
          type: string
          enum: [PERCENT, FLAT]
        discountValue:
          type: integer
        minBooking:
          type: integer
        maxDiscount:
          type: integer
        validUntil:
          type: string
          format: date
        maxUses:
          type: integer

    UpdateCouponRequest:
      type: object
      properties:
        isActive:
          type: boolean

    ValidateCouponRequest:
      type: object
      required: [code, bookingAmount]
      properties:
        code:
          type: string
        bookingAmount:
          type: integer

    CouponValidationResponse:
      type: object
      properties:
        valid:
          type: boolean
        discount:
          type: integer
        message:
          type: string

    CouponPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/CouponDto'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    # ─── Payout ─────────────────────────────────────────────────────────────
    PayoutDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        ownerId:
          type: integer
          format: int64
        ownerName:
          type: string
        amount:
          type: integer
        commissionDeducted:
          type: integer
        netAmount:
          type: integer
        status:
          type: string
        date:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time

    PayoutPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/PayoutDto'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    # ─── Dispute ────────────────────────────────────────────────────────────
    DisputeDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        bookingId:
          type: integer
          format: int64
        playerId:
          type: integer
          format: int64
        playerName:
          type: string
        ownerId:
          type: integer
          format: int64
        ownerName:
          type: string
        venueName:
          type: string
        issue:
          type: string
        status:
          type: string
        resolvedNote:
          type: string
        createdAt:
          type: string
          format: date

    CreateDisputeRequest:
      type: object
      required: [bookingId, issue]
      properties:
        bookingId:
          type: integer
          format: int64
        issue:
          type: string

    ResolveDisputeRequest:
      type: object
      required: [resolvedNote]
      properties:
        resolvedNote:
          type: string

    DisputePage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/DisputeDto'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    # ─── Notification ────────────────────────────────────────────────────────
    NotificationDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        title:
          type: string
        body:
          type: string
        type:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time
        referenceId:
          type: string
        referenceType:
          type: string

    BroadcastRequest:
      type: object
      required: [title, body, audience]
      properties:
        title:
          type: string
        body:
          type: string
        audience:
          type: string
          enum: [ALL, PLAYERS, OWNERS]

    NotificationPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/NotificationDto'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    # ─── Stats ──────────────────────────────────────────────────────────────
    AdminStatsDto:
      type: object
      properties:
        bookingsToday:
          type: integer
          format: int64
        revenueToday:
          type: integer
          format: int64
        newUsers:
          type: integer
          format: int64
        activeVenues:
          type: integer
          format: int64
        pendingApprovals:
          type: integer
          format: int64
        openDisputes:
          type: integer
          format: int64

    OwnerStatsDto:
      type: object
      properties:
        todayBookings:
          type: integer
          format: int64
        todayRevenue:
          type: integer
          format: int64
        weekRevenue:
          type: integer
          format: int64
        monthRevenue:
          type: integer
          format: int64
        pendingPayout:
          type: integer
          format: int64

    # ─── Owner Dashboard Summary ─────────────────────────────────────────────
    OwnerDashboardSummary:
      type: object
      required: [earnings, bookings, stats]
      properties:
        earnings:
          $ref: '#/components/schemas/DashboardEarnings'
        bookings:
          $ref: '#/components/schemas/DashboardBookingCounts'
        stats:
          $ref: '#/components/schemas/DashboardStats'

    DashboardEarnings:
      type: object
      required: [todayAmount, weekAmount, monthAmount, pendingAmount, todayBookingCount]
      properties:
        todayAmount:
          type: integer
          format: int64
        weekAmount:
          type: integer
          format: int64
        monthAmount:
          type: integer
          format: int64
        pendingAmount:
          type: integer
          format: int64
        todayBookingCount:
          type: integer
          format: int64

    DashboardBookingCounts:
      type: object
      required: [requests, today, upcoming, completedLast30Days, cancelledLast30Days]
      properties:
        requests:
          type: integer
          format: int64
        today:
          type: integer
          format: int64
        upcoming:
          type: integer
          format: int64
        completedLast30Days:
          type: integer
          format: int64
        cancelledLast30Days:
          type: integer
          format: int64

    DashboardStats:
      type: object
      required: [usersConnected, venueCount, courtCount]
      properties:
        usersConnected:
          type: integer
          format: int64
        venueCount:
          type: integer
          format: int64
        courtCount:
          type: integer
          format: int64

    # ─── Platform Settings ───────────────────────────────────────────────────
    PlatformSettingsDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        commissionPercent:
          type: integer
        convenienceFee:
          type: integer
        maintenanceMode:
          type: boolean
        autoApproveVenues:
          type: boolean

    UpdateSettingsRequest:
      type: object
      properties:
        commissionPercent:
          type: integer
          minimum: 0
          maximum: 100
        convenienceFee:
          type: integer
          minimum: 0
        maintenanceMode:
          type: boolean
        autoApproveVenues:
          type: boolean

    # ─── Error ──────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      properties:
        field:
          type: string
        message:
          type: string

    EmailChangeRequestDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        currentEmail:
          type: string
        newEmail:
          type: string
        status:
          type: string
          enum: [PENDING_VERIFICATION, PENDING, APPROVED, REJECTED]
        createdAt:
          type: string
          format: date-time
        decidedAt:
          type: string
          format: date-time
        reason:
          type: string

    # ─── Subscriptions ────────────────────────────────────────────────────────
    # Response DTOs use plain strings for enum-valued fields (matching the rest of
    # this spec); request bodies keep enums so invalid input is rejected with 400.
    # FeatureCode values: AUTO_ACCEPT, OFFERS, ANALYTICS, ADVANCED_ANALYTICS,
    # PRIORITY_PLACEMENT, FEATURED_BADGE, PRIORITY_SUPPORT.
    SubscriptionPlan:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
          description: One of STARTER, GROWTH, PRO, PRO_MAX
        name:
          type: string
        maxCourts:
          type: integer
        priceMonthly:
          type: integer
        priceAnnual:
          type: integer
        currency:
          type: string
        features:
          type: array
          items:
            type: string
        photoLimit:
          type: integer
        placementWeight:
          type: integer
        trialDays:
          type: integer
        active:
          type: boolean
        displayOrder:
          type: integer

    UpdatePlanRequest:
      type: object
      description: Admin catalog edit. Code is immutable; omit a field to leave it unchanged.
      properties:
        name:
          type: string
        maxCourts:
          type: integer
          minimum: 1
        priceMonthly:
          type: integer
          minimum: 0
        priceAnnual:
          type: integer
          minimum: 0
        features:
          type: array
          description: FeatureCode values. Unknown values are rejected.
          items:
            type: string
        photoLimit:
          type: integer
          minimum: 0
        placementWeight:
          type: integer
          minimum: 0
        trialDays:
          type: integer
          minimum: 0
        active:
          type: boolean
        displayOrder:
          type: integer

    Subscription:
      type: object
      description: >
        A venue subscription. Carries snapshot fields (planCode, planName, price,
        maxCourts, features) so history stays accurate if the catalog later changes.
        All period dates are computed and owned by the server.
      properties:
        id:
          type: integer
          format: int64
        ownerId:
          type: integer
          format: int64
        venueId:
          type: integer
          format: int64
        planId:
          type: integer
          format: int64
        planCode:
          type: string
        planName:
          type: string
        billingCycle:
          type: string
          description: MONTHLY or ANNUAL
        status:
          type: string
          description: TRIALING, ACTIVE, PAST_DUE, EXPIRED, CANCELED, or VOIDED
        periodStart:
          type: string
          format: date-time
        periodEnd:
          type: string
          format: date-time
        trialEnd:
          type: string
          format: date-time
          nullable: true
        price:
          type: integer
        currency:
          type: string
        maxCourts:
          type: integer
        features:
          type: array
          items:
            type: string
        activationSource:
          type: string
          description: ADMIN_MANUAL or PROVIDER
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SubscriptionCreateRequest:
      type: object
      description: Admin manual activation. Contains NO date fields — the server computes all periods.
      required: [ownerId, venueId, planId, billingCycle]
      properties:
        ownerId:
          type: integer
          format: int64
        venueId:
          type: integer
          format: int64
        planId:
          type: integer
          format: int64
        billingCycle:
          type: string
          enum: [MONTHLY, ANNUAL]
        asTrial:
          type: boolean
          default: false
        paymentMethod:
          type: string
          enum: [CASH, UPI_OFFLINE, BANK_TRANSFER, PROVIDER]
        paymentReference:
          type: string
        notes:
          type: string

    SubscriptionEditRequest:
      type: object
      description: Admin correction of plan/cycle. Contains NO date fields — the server recomputes periods.
      properties:
        planId:
          type: integer
          format: int64
        billingCycle:
          type: string
          enum: [MONTHLY, ANNUAL]
        notes:
          type: string

    SubscriptionPayment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        subscriptionId:
          type: integer
          format: int64
        amount:
          type: integer
        currency:
          type: string
        method:
          type: string
          description: CASH, UPI_OFFLINE, BANK_TRANSFER, or PROVIDER
        status:
          type: string
          description: RECORDED, PENDING, or FAILED
        paidAt:
          type: string
          format: date-time
        recordedByAdminId:
          type: integer
          format: int64
          nullable: true
        reference:
          type: string

    SubscriptionChangeRequest:
      type: object
      properties:
        id:
          type: integer
          format: int64
        ownerId:
          type: integer
          format: int64
        venueId:
          type: integer
          format: int64
        venueName:
          type: string
        venueCity:
          type: string
          nullable: true
        ownerName:
          type: string
        ownerEmail:
          type: string
          nullable: true
        currentSubscriptionId:
          type: integer
          format: int64
          nullable: true
        currentPlanName:
          type: string
          nullable: true
        requestedPlanId:
          type: integer
          format: int64
        requestedPlanCode:
          type: string
        requestedPlanName:
          type: string
        requestedPlanPrice:
          type: integer
          description: Price for the requested billing cycle (₹)
        requestedPlanMaxCourts:
          type: integer
        requestedCycle:
          type: string
          description: MONTHLY or ANNUAL
        status:
          type: string
          description: PENDING, APPROVED, REJECTED, or CANCELLED
        createdAt:
          type: string
          format: date-time
        decidedAt:
          type: string
          format: date-time
          nullable: true
        reason:
          type: string

    VenueSubscriptionView:
      type: object
      description: >
        Owner/admin view of a venue's subscription state, usage, and recent history.
        The venue / owner / timeline blocks are populated only on the admin detail endpoint.
      properties:
        current:
          allOf:
            - $ref: '#/components/schemas/Subscription'
          nullable: true
        courtsUsed:
          type: integer
        courtsAllowed:
          type: integer
        history:
          type: array
          items:
            $ref: '#/components/schemas/Subscription'
        pendingChangeRequest:
          allOf:
            - $ref: '#/components/schemas/SubscriptionChangeRequest'
          nullable: true
        venue:
          allOf:
            - $ref: '#/components/schemas/SubscriptionVenueRef'
          nullable: true
        owner:
          allOf:
            - $ref: '#/components/schemas/SubscriptionOwnerRef'
          nullable: true
        timeline:
          allOf:
            - $ref: '#/components/schemas/SubscriptionTimeline'
          nullable: true

    SubscriptionVenueRef:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        city: { type: string, nullable: true }
        courtCount: { type: integer }
        registeredAt: { type: string, format: date-time, nullable: true }
        approvedAt: { type: string, format: date-time, nullable: true }

    SubscriptionOwnerRef:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        mobile: { type: string, nullable: true }
        email: { type: string, nullable: true }

    StageKey:
      type: string
      enum: [REGISTERED, APPROVED, TRIAL_ACTIVATED, SUBSCRIPTION]
    StageState:
      type: string
      enum: [COMPLETED, LIVE, PENDING]
    TimelineStage:
      type: object
      properties:
        key: { $ref: '#/components/schemas/StageKey' }
        label: { type: string }
        occurredAt: { type: string, format: date-time, nullable: true }
        state: { $ref: '#/components/schemas/StageState' }
    SubscriptionTimeline:
      type: object
      properties:
        stages:
          type: array
          items:
            $ref: '#/components/schemas/TimelineStage'
        liveStageKey:
          allOf:
            - $ref: '#/components/schemas/StageKey'
          nullable: true

    VenueSubscriptionRow:
      type: object
      description: One row in the admin venue-subscription table.
      properties:
        venueId: { type: integer, format: int64 }
        venueName: { type: string }
        venueCity: { type: string, nullable: true }
        ownerName: { type: string }
        ownerMobile: { type: string, nullable: true }
        currentPlanCode: { type: string, nullable: true }
        currentPlanName: { type: string, nullable: true }
        currentStatus:
          type: string
          description: ACTIVE, TRIAL, EXPIRING, EXPIRED, or NONE (row-level rollup)
        endDate: { type: string, format: date-time, nullable: true }
        courtsUsed: { type: integer }
        courtLimit: { type: integer, nullable: true }
        pendingRequestId: { type: integer, format: int64, nullable: true }
        pendingCurrentPlanName: { type: string, nullable: true }
        pendingRequestedPlanName: { type: string, nullable: true }
    VenueSubscriptionPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/VenueSubscriptionRow'
        totalElements: { type: integer, format: int64 }
        totalPages: { type: integer }
        size: { type: integer }
        number: { type: integer }

    SubscriptionPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Subscription'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        size:
          type: integer
        number:
          type: integer

    UpgradeRequestCreate:
      type: object
      required: [requestedPlanId, billingCycle]
      properties:
        requestedPlanId:
          type: integer
          format: int64
        billingCycle:
          type: string
          enum: [MONTHLY, ANNUAL]

    RejectChangeRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

paths:
  # ─── Auth ─────────────────────────────────────────────────────────────────
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/otp/send:
    post:
      tags: [Auth]
      summary: Request OTP (email → SMS to registered phone)
      operationId: sendOtp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpSendRequest'
      responses:
        '200':
          description: OTP dispatched (or silently no-op for unknown email to avoid enumeration)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpSendResponse'
        '400':
          description: Validation error (missing/invalid email)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP and obtain JWT
      operationId: verifyOtp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyRequest'
      responses:
        '200':
          description: OTP verified — JWT issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid/expired OTP or too many attempts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Forgot password
      operationId: forgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Reset email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  # ─── Auth Security (standalone — not generated into AuthApi) ─────────────
  /api/v1/auth/change-password:
    post:
      tags: [AuthSecurity]
      summary: Change password (authenticated)
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password changed; fresh JWT returned for current device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Current password incorrect
        '400':
          description: Weak/invalid password or same as current
        '429':
          description: Rate-limited

  /api/v1/auth/password-reset/request:
    post:
      tags: [AuthSecurity]
      summary: Request password reset via email OTP (enumeration-safe)
      operationId: requestPasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Generic success (same response whether email exists or not)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'

  /api/v1/auth/password-reset/verify:
    post:
      tags: [AuthSecurity]
      summary: Verify password-reset OTP; returns a single-use reset token
      operationId: verifyPasswordResetOtp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp]
              properties:
                email:
                  type: string
                  format: email
                otp:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        '200':
          description: OTP verified; returns short-lived reset token
          content:
            application/json:
              schema:
                type: object
                properties:
                  resetToken:
                    type: string
        '400':
          description: Invalid / expired OTP or too many attempts

  /api/v1/auth/password-reset/confirm:
    post:
      tags: [AuthSecurity]
      summary: Set new password using the reset token
      operationId: confirmPasswordReset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resetToken, newPassword]
              properties:
                resetToken:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password reset successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Invalid/expired reset token or weak password

  # ─── Email Change (owner → admin approval) ────────────────────────────────
  /api/v1/owner/email-change-requests:
    post:
      tags: [EmailChange]
      summary: Owner submits new email — sends OTP to new address
      operationId: createEmailChangeRequest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newEmail]
              properties:
                newEmail:
                  type: string
                  format: email
      responses:
        '200':
          description: OTP sent to new email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '409':
          description: Email already in use or pending request exists

  /api/v1/owner/email-change-requests/verify:
    post:
      tags: [EmailChange]
      summary: Owner verifies new-email OTP — request moves to PENDING
      operationId: verifyEmailChangeOtp
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otp]
              properties:
                otp:
                  type: string
                  minLength: 6
                  maxLength: 6
      responses:
        '200':
          description: OTP verified; request now in admin queue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailChangeRequestDto'

  /api/v1/owner/email-change-requests/me:
    get:
      tags: [EmailChange]
      summary: Get current email-change request status
      operationId: getEmailChangeStatus
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Latest request or 204 if none
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailChangeRequestDto'
        '204':
          description: No request on file

  /api/v1/admin/email-change-requests:
    get:
      tags: [EmailChange]
      summary: Admin — list email-change requests by status
      operationId: adminListEmailChangeRequests
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING_VERIFICATION, PENDING, APPROVED, REJECTED]
            default: PENDING
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list

  /api/v1/admin/email-change-requests/{id}/approve:
    post:
      tags: [EmailChange]
      summary: Admin — approve email change
      operationId: adminApproveEmailChange
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Approved; user email updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailChangeRequestDto'

  /api/v1/admin/email-change-requests/{id}/reject:
    post:
      tags: [EmailChange]
