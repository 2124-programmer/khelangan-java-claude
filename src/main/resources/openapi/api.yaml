      tags: [Venues]
      summary: Get venue detail
      operationId: getVenue
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Venue detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueDetailDto'
        '404':
          description: Not found
    put:
      tags: [Venues]
      summary: Update venue (Owner)
      operationId: updateVenue
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVenueRequest'
      responses:
        '200':
          description: Updated venue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueDetailDto'

