    delete:
      tags: [AdminOwners]
      summary: Soft-delete an owner (cascade + release email + phone)
      operationId: deleteOwner
      parameters:
        - { name: ownerId, in: path, required: true, schema: { type: integer, format: int64 } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/OwnerReasonBody' } } }
