  /api/v1/venues/{venueId}/favorite:
    post:
      tags: [Venues]
      summary: Favorite a venue (Player)
      operationId: favoriteVenue
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Venue favorited (idempotent)
    delete:
      tags: [Venues]
      summary: Unfavorite a venue (Player)
      operationId: unfavoriteVenue
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Venue unfavorited (idempotent)

  /api/v1/venues/{venueId}/contact:
    post:
      tags: [Venues]
      summary: Record a contact intent and notify the venue owner (Player)
      description: >-
        Logged-in player taps Call or WhatsApp on a venue. Records the intent and notifies
        the owner ("someone wants to contact you"), deduped per player+venue within a cooldown
        window. Best-effort from the client's perspective — the dialer/WhatsApp launches
        regardless of this call's result.
      operationId: contactVenue
      parameters:
        - name: venueId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactVenueRequest'
      responses:
        '202':
          description: Intent recorded; owner notified (or notification deduped within the cooldown)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactVenueResponse'
        '404':
          description: Venue not found

  /api/v1/venues:
    get:
      tags: [Venues]
      summary: List venues
      operationId: listVenues
      security: []
      parameters:
        - name: city
          in: query
          schema:
            type: string
        - name: sport
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: sort
          in: query
          description: Result ordering. DEFAULT applies plan placement + rating. DISTANCE needs lat/lng.
          schema:
            type: string
            enum: [DEFAULT, PRICE_LOW, PRICE_HIGH, RATING, NEWEST, DISTANCE]
            default: DEFAULT
        - name: lat
          in: query
          description: Player latitude — enables DISTANCE sort (nearest first).
          schema:
            type: number
            format: double
        - name: lng
          in: query
          description: Player longitude — paired with lat for DISTANCE sort.
          schema:
            type: number
            format: double
        - name: minPrice
          in: query
          schema:
            type: integer
        - name: maxPrice
          in: query
          schema:
            type: integer
        - name: minRating
          in: query
          schema:
            type: number
            format: double
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Page of venues
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueSummaryPage'
    post:
      tags: [Venues]
      summary: Create venue (Owner)
      operationId: createVenue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVenueRequest'
      responses:
        '201':
          description: Created venue
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VenueDetailDto'

  /api/v1/venues/{id}:
